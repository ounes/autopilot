name: Deploy to TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  deploy:
    name: Build and Upload to TestFlight
    runs-on: macos-15  # macOS avec Xcode 16
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          cd ios && pod install
      
      - name: Configure Xcode signing
        run: |
          # Configurer le signing automatique
          /usr/libexec/PlistBuddy -c "Set :objects:ATTRIBUTES:TargetAttributes:DEVELOPMENT_TEAM ${{ secrets.APPLE_TEAM_ID }}" ios/AutoPilot.xcodeproj/project.pbxproj || true
      
      - name: Build and archive
        run: |
          xcodebuild -workspace ios/AutoPilot.xcworkspace \
            -scheme AutoPilot \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/AutoPilot.xcarchive \
            clean archive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"
      
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/AutoPilot.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $PWD/build
      
      - name: Upload to TestFlight
        env:
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
        run: |
          bundle exec fastlane run upload_to_testflight \
            ipa:"$PWD/build/AutoPilot.ipa" \
            skip_waiting_for_build_processing:true
      
      - name: Upload build artifacts (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            ~/Library/Logs/gym/

