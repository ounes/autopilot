name: Deploy to TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  deploy:
    name: Build and Upload to TestFlight
    runs-on: macos-15  # macOS avec Xcode 16
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          cd ios && pod install
      
      - name: Install signing certificate and provisioning profile
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Decode certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # Import certificate
          security import certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # Verify certificate was imported
          echo "=== Certificates in keychain ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          
          # Delete any Apple Development certificates to avoid conflicts
          echo "=== Removing Apple Development certificates if present ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH | grep "Apple Development" | awk '{print $2}' | while read hash; do
            security delete-certificate -Z "$hash" $KEYCHAIN_PATH 2>/dev/null || true
          done
          
          echo "=== Final certificates in keychain ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          
          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/8e6a9f4b-a003-42b8-9255-c5ecc6d1f8ef.mobileprovision
          
          # Cleanup certificate file
          rm certificate.p12
      
      - name: Build and archive (manual signing)
        run: |
          xcodebuild -workspace ios/AutoPilot.xcworkspace \
            -scheme AutoPilot \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/AutoPilot.xcarchive \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution: Ounes Chadli (2T2SB8U85C)" \
            PROVISIONING_PROFILE_SPECIFIER="8e6a9f4b-a003-42b8-9255-c5ecc6d1f8ef" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"
      
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/AutoPilot.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $PWD/build
      
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_PATH: /tmp/AuthKey.p8
        run: |
          # Create API Key .p8 file
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" > /tmp/AuthKey.p8
          
          # Upload using Fastlane lane with API Key
          bundle exec fastlane upload_with_api_key
          
          # Cleanup
          rm /tmp/AuthKey.p8
      
      - name: Cleanup keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm ~/Library/MobileDevice/Provisioning\ Profiles/8e6a9f4b-a003-42b8-9255-c5ecc6d1f8ef.mobileprovision || true
      
      - name: Upload build artifacts (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            ~/Library/Logs/gym/
