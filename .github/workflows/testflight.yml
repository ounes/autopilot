name: Deploy to TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  deploy:
    name: Build and Upload to TestFlight
    runs-on: macos-15  # macOS avec Xcode 16
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          cd ios && pod install
      
      - name: Configure Xcode for automatic signing
        run: |
          # Forcer automatic signing dans le projet
          plutil -replace "CODE_SIGN_STYLE" -string "Automatic" ios/AutoPilot.xcodeproj/project.pbxproj 2>/dev/null || true
          # Configurer le Team ID pour automatic signing
          sed -i '' 's/DEVELOPMENT_TEAM = ""/DEVELOPMENT_TEAM = "${{ secrets.APPLE_TEAM_ID }}"/' ios/AutoPilot.xcodeproj/project.pbxproj
      
      - name: Build and archive (automatic signing)
        run: |
          xcodebuild -workspace ios/AutoPilot.xcworkspace \
            -scheme AutoPilot \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/AutoPilot.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Automatic \
            clean archive
        env:
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
      
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/AutoPilot.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $PWD/build \
            -allowProvisioningUpdates
        env:
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
      
      - name: Upload to TestFlight
        env:
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
        run: |
          bundle exec fastlane run upload_to_testflight \
            ipa:"$PWD/build/AutoPilot.ipa" \
            skip_waiting_for_build_processing:true
      
      - name: Upload build artifacts (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            ~/Library/Logs/gym/
